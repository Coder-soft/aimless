name: Build & Release

on:
  push:
    branches:
      - master
      - 1.21.11
      - 26.x

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: 1.21.11
            java: 21
          - branch: 26.x
            java: 25
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - run: ./gradlew build
      - uses: actions/upload-artifact@v4
        with:
          name: aimless-${{ matrix.branch }}
          path: build/libs/*.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Get timestamp
        id: date
        run: echo "timestamp=$(date -u +'%Y-%m-%dT%H-%M-%SZ')" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.date.outputs.timestamp }}
          name: Aimless ${{ steps.date.outputs.timestamp }}
          body: |
            Automated build.
            Branches: 1.21.11, 26.x
            Build time: ${{ steps.date.outputs.timestamp }}
          files: aimless-*/*.jar
          fail_on_unmatched_files: true
          generate_release_notes: true
